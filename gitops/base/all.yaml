---
# Source: internal-service/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: base-internal-service
  labels:
    app.kubernetes.io/name: internal-service
    app.kubernetes.io/instance: base
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: internal-service-0.1.0
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: internal-service
    app.kubernetes.io/instance: base
---
# Source: internal-service/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: base-internal-service
  labels:
    app.kubernetes.io/name: internal-service
    app.kubernetes.io/instance: base
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: internal-service-0.1.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: internal-service
      app.kubernetes.io/instance: base
  template:
    metadata:
      labels:
        app.kubernetes.io/name: internal-service
        app.kubernetes.io/instance: base
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/managed-by: Helm
        helm.sh/chart: internal-service-0.1.0
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: internal-service
                    app.kubernetes.io/instance: base
                topologyKey: kubernetes.io/hostname
      containers:
        - name: internal-service
          image: "docker.io/dreamliner/internal-service:latest"
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: PROD
              value: "false"
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
# Source: internal-service/templates/hpa.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: base-internal-service
  labels:
    app.kubernetes.io/name: internal-service
    app.kubernetes.io/instance: base
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: internal-service-0.1.0
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: base-internal-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
